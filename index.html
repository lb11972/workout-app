<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Workout App</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
padding:12px;
margin:10px;
font-size:16px;
width:80%;
}

.timer{
font-size:30px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>Workout App</h1>

<div id="menu">

<button onclick="startWarmup()">🔥 Riscaldamento</button>

<button onclick="startWorkoutA()">🦵 Allenamento A</button>

<button onclick="startWorkoutB()">💪 Allenamento B</button>

<button onclick="startCore()">🧠 Core</button>

</div>

<h2 id="exercise"></h2>
<p id="details"></p>

<button onclick="nextExercise()">Prossimo esercizio</button>

<br>

<button onclick="startTimer(60)">Recupero 60s</button>
<button onclick="startTimer(90)">Recupero 90s</button>

<div class="timer" id="timer"></div>

</div>

<script>

let exercises=[]
let index=0

function startWarmup(){

exercises=[

{n:"Mobilità",d:"Gatto – Sfinge / Devoto / Rotazioni schiena"},
{n:"Tapis roulant",d:"10 minuti"},
{n:"Skip basso",d:"20 sec"},
{n:"Skip alto",d:"20 sec"},
{n:"Calciata",d:"20 sec"},
{n:"Flessione lombare",d:"2 serie"}

]

index=0
show()

}

function startWorkoutA(){

exercises=[

{n:"Squat",d:"4 x 10"},
{n:"Sumo Squat",d:"4 x 10"},
{n:"Leg Extension",d:"3 x 10-12"},
{n:"Leg Curl",d:"3 x 10-12"},
{n:"Affondi",d:"3 x 10 per gamba"},
{n:"Stacco Rumeno",d:"3 x 10-12"}

]

index=0
show()

}

function startWorkoutB(){

exercises=[

{n:"Push up",d:"4 x 10"},
{n:"Lat machine",d:"4 x 10"},
{n:"Pull down",d:"4 x 10-12"},
{n:"Shoulder press",d:"3 x 10-12"},
{n:"Alzate laterali",d:"3 x 10"},
{n:"Rematore manubrio",d:"3 x 10"}

]

index=0
show()

}

function startCore(){

exercises=[

{n:"Dead bug",d:"30 sec"},
{n:"Mountain climber",d:"30 sec"},
{n:"Plank laterale SX",d:"30 sec"},
{n:"Plank laterale DX",d:"30 sec"}

]

index=0
show()

}

function show(){

document.getElementById("exercise").innerText=exercises[index].n
document.getElementById("details").innerText=exercises[index].d

}

function nextExercise(){

index++

if(index>=exercises.length){
index=0
}

show()

}

let countdown

function startTimer(seconds){

clearInterval(countdown)

let time=seconds

document.getElementById("timer").innerText=time

countdown=setInterval(function(){

time--

document.getElementById("timer").innerText=time

if(time<=0){

clearInterval(countdown)

document.getElementById("timer").innerText="FINE"

}

},1000)

}

</script>

</body>
</html>
