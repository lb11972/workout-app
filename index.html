<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Workout</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Workout">

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#0f172a;
margin:0;
color:white;
}

.header{
text-align:center;
padding:20px;
font-size:26px;
font-weight:bold;
}

.container{
padding:16px;
}

.card{
background:#1e293b;
border-radius:18px;
padding:20px;
margin-bottom:18px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
font-size:18px;
margin-top:10px;
background:#22c55e;
color:white;
}

.secondary{
background:#3b82f6;
}

.exerciseIcon{
font-size:48px;
text-align:center;
}

.exerciseName{
font-size:24px;
text-align:center;
margin-top:6px;
}

.exerciseDetails{
text-align:center;
opacity:0.8;
}

.series{
text-align:center;
margin-top:10px;
font-size:18px;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
margin-top:10px;
font-size:18px;
text-align:center;
}

#lastWeight{
text-align:center;
font-size:14px;
opacity:0.7;
margin-top:4px;
}

#progressBar{
height:10px;
background:#334155;
border-radius:10px;
margin-bottom:10px;
}

#progress{
height:10px;
background:#22c55e;
border-radius:10px;
width:0%;
}

#recoveryScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

#recoveryTimer{
font-size:120px;
font-weight:bold;
}

#finishScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

#finishTime{
font-size:50px;
margin-top:10px;
}

</style>

</head>

<body>

<div id="recoveryScreen">
<div style="font-size:28px;margin-bottom:20px">RECUPERO</div>
<div id="recoveryTimer">60</div>
</div>

<div id="finishScreen">
<h1>Allenamento completato 💪</h1>
<div>Durata allenamento</div>
<div id="finishTime"></div>
</div>

<div class="header">
🏋️ Workout
</div>

<div class="container">

<div class="card">

<button onclick="startGuided()">Allenamento di oggi</button>

<button onclick="startWarmup()">Riscaldamento</button>

<button onclick="startWorkoutA()">Gambe</button>

<button onclick="startWorkoutB()">Parte alta</button>

<button onclick="startCore()">Core</button>

</div>

<div class="card">

<div id="progressBar">
<div id="progress"></div>
</div>

<div class="exerciseIcon" id="icon"></div>

<div class="exerciseName" id="exercise"></div>

<div class="exerciseDetails" id="details"></div>

<div class="series" id="series"></div>

<div id="weightArea">

<input id="weightInput" placeholder="Peso">

<div id="lastWeight"></div>

<button class="secondary" onclick="saveWeight()">Salva peso</button>

</div>

<button onclick="completeSet()">Serie completata</button>

</div>

</div>

<script>

// SERVICE WORKER OFFLINE

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
