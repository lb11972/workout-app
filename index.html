<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Workout App</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

.header{
background:#020617;
padding:18px;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:#1e293b;
border-radius:14px;
padding:20px;
margin:15px auto;
max-width:420px;
box-shadow:0 6px 16px rgba(0,0,0,0.4);
}

button{
background:#22c55e;
border:none;
padding:12px;
margin:8px;
color:white;
border-radius:10px;
font-size:16px;
width:85%;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.secondary{
background:#3b82f6;
}

.exercise{
font-size:26px;
margin-top:10px;
}

.details{
font-size:18px;
opacity:0.9;
}

.timer{
font-size:32px;
margin-top:10px;
}

.warning{
color:#f87171;
margin-top:10px;
font-size:14px;
}

.icon{
font-size:34px;
}

</style>

</head>

<body>

<div class="header">
🏋️ Workout App
</div>

<div class="container">

<div class="card">

<button onclick="startGuided()">▶ Allenamento di oggi</button>

<button onclick="startWarmup()">🔥 Riscaldamento</button>

<button onclick="startWorkoutA()">🦵 Gambe</button>

<button onclick="startWorkoutB()">💪 Parte alta</button>

<button onclick="startCore()">🧠 Core</button>

</div>

<div class="card">

<div class="icon" id="icon"></div>

<div class="exercise" id="exercise"></div>

<div class="details" id="details"></div>

<div class="warning" id="warning"></div>

<br>

<button onclick="completeSet()" class="secondary">
✔ Serie completata
</button>

<button onclick="nextExercise()" class="secondary">
▶ Prossimo esercizio
</button>

</div>

<div class="card">

⏱ Timer recupero

<div class="timer" id="timer"></div>

<button onclick="startTimer(60)">60s</button>

<button onclick="startTimer(90)">90s</button>

</div>

</div>

<script>

let exercises=[]
let index=0

function startGuided(){

let last=localStorage.getItem("lastWorkout")

if(last=="A"){
startWorkoutB()
localStorage.setItem("lastWorkout","B")
}else{
startWorkoutA()
localStorage.setItem("lastWorkout","A")
}

}

function startWarmup(){

exercises=[

{i:"🧘",n:"Mobilità",d:"Gatto – Sfinge / Devoto"},
{i:"🏃",n:"Tapis roulant",d:"10 min"},
{i:"⚡",n:"Skip basso",d:"20 sec"},
{i:"⚡",n:"Skip alto",d:"20 sec"},
{i:"⚡",n:"Calciata",d:"20 sec"},
{i:"🦴",n:"Flessione lombare",d:"2 serie"}

]

index=0
show()

}

function startWorkoutA(){

exercises=[

{i:"🏋️",n:"Squat",d:"4 x 10"},
{i:"🏋️",n:"Sumo Squat",d:"4 x 10"},
{i:"🦵",n:"Leg Extension",d:"3 x 12"},
{i:"🦵",n:"Leg Curl",d:"3 x 12"},
{i:"🚶",n:"Affondi",d:"3 x 10"},
{i:"🏋️",n:"Stacco Rumeno",d:"3 x 10"}

]

index=0
show()

}

function startWorkoutB(){

exercises=[

{i:"💪",n:"Push Up",d:"4 x 10"},
{i:"💪",n:"Lat Machine",d:"4 x 10"},
{i:"💪",n:"Pull Down",d:"4 x 10"},
{i:"🏋️",n:"Shoulder Press",d:"3 x 12"},
{i:"💪",n:"Alzate Laterali",d:"3 x 10"},
{i:"💪",n:"Rematore",d:"3 x 10"}

]

index=0
show()

}

function startCore(){

exercises=[

{i:"🧠",n:"Dead Bug",d:"30 sec"},
{i:"🔥",n:"Mountain Climber",d:"30 sec"},
{i:"🧠",n:"Plank SX",d:"30 sec"},
{i:"🧠",n:"Plank DX",d:"30 sec"}

]

index=0
show()

}

function show(){

let ex=exercises[index]

document.getElementById("icon").innerText=ex.i
document.getElementById("exercise").innerText=ex.n
document.getElementById("details").innerText=ex.d

let risk=["Squat","Stacco Rumeno","Affondi"]

if(risk.includes(ex.n)){
document.getElementById("warning").innerText="⚠ Mantieni schiena neutra e addome attivo"
}else{
document.getElementById("warning").innerText=""
}

}

function nextExercise(){

index++

if(index>=exercises.length){
index=0
}

show()

}

function completeSet(){

startTimer(90)

}

let countdown

function startTimer(seconds){

clearInterval(countdown)

let time=seconds

document.getElementById("timer").innerText=time

countdown=setInterval(function(){

time--

document.getElementById("timer").innerText=time

if(time<=0){

clearInterval(countdown)

document.getElementById("timer").innerText="FINE"

let beep=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")

beep.play()

if(navigator.vibrate){
navigator.vibrate(500)
}

}

},1000)

}

</script>

</body>

</html>
