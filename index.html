<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Workout App</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

.header{
background:#020617;
padding:18px;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:#1e293b;
border-radius:14px;
padding:20px;
margin:15px auto;
max-width:420px;
box-shadow:0 6px 16px rgba(0,0,0,0.4);
}

button{
background:#22c55e;
border:none;
padding:12px;
margin:8px;
color:white;
border-radius:10px;
font-size:16px;
width:85%;
}

.secondary{
background:#3b82f6;
}

.exercise{
font-size:26px;
margin-top:10px;
}

.details{
font-size:18px;
opacity:0.9;
}

.series{
font-size:18px;
margin-top:10px;
}

.icon{
font-size:36px;
}

.warning{
color:#f87171;
font-size:14px;
}

#recoveryScreen{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999;

}

#recoveryTimer{

font-size:120px;
font-weight:bold;

}

#recoveryText{

font-size:30px;
margin-bottom:20px;

}

</style>

</head>

<body>

<div id="recoveryScreen">

<div id="recoveryText">RECUPERO</div>

<div id="recoveryTimer">60</div>

</div>

<div class="header">
🏋️ Workout App
</div>

<div class="container">

<div class="card">

<button onclick="startGuided()">▶ Allenamento di oggi</button>

<button onclick="startWarmup()">🔥 Riscaldamento</button>

<button onclick="startWorkoutA()">🦵 Gambe</button>

<button onclick="startWorkoutB()">💪 Parte alta</button>

<button onclick="startCore()">🧠 Core</button>

</div>

<div class="card">

<div class="icon" id="icon"></div>

<div class="exercise" id="exercise"></div>

<div class="details" id="details"></div>

<div class="series" id="series"></div>

<div class="warning" id="warning"></div>

<br>

<button onclick="completeSet()" class="secondary">
✔ Serie completata
</button>

</div>

</div>

<script>

let exercises=[]
let index=0
let currentSet=0

function startGuided(){

let last=localStorage.getItem("lastWorkout")

if(last=="A"){
startWorkoutB()
localStorage.setItem("lastWorkout","B")
}else{
startWorkoutA()
localStorage.setItem("lastWorkout","A")
}

}

function startWarmup(){

exercises=[

{i:"🧘",n:"Mobilità",d:"Gatto – Sfinge",sets:2},
{i:"⚡",n:"Skip basso",d:"20 sec",sets:2},
{i:"⚡",n:"Skip alto",d:"20 sec",sets:2},
{i:"⚡",n:"Calciata",d:"20 sec",sets:2},
{i:"🦴",n:"Flessione lombare",d:"10 ripetizioni",sets:2},
{i:"🏃",n:"Tapis roulant",d:"10 min",sets:1}

]

index=0
currentSet=0
show()

}

function startWorkoutA(){

exercises=[

{i:"🏋️",n:"Squat",d:"10 ripetizioni",sets:4},
{i:"🏋️",n:"Sumo Squat",d:"10 ripetizioni",sets:4},
{i:"🚶",n:"Affondi",d:"10 ripetizioni",sets:3},
{i:"🏋️",n:"Stacco Rumeno",d:"10 ripetizioni",sets:3}

]

index=0
currentSet=0
show()

}

function startWorkoutB(){

exercises=[

{i:"💪",n:"Push Up",d:"10 ripetizioni",sets:4},
{i:"💪",n:"Lat Machine",d:"10 ripetizioni",sets:4},
{i:"💪",n:"Pull Down",d:"10 ripetizioni",sets:4},
{i:"🏋️",n:"Shoulder Press",d:"12 ripetizioni",sets:3},
{i:"💪",n:"Alzate Laterali",d:"10 ripetizioni",sets:3},
{i:"💪",n:"Rematore",d:"10 ripetizioni",sets:3},
{i:"🦵",n:"Leg Extension",d:"12 ripetizioni",sets:3},
{i:"🦵",n:"Leg Curl",d:"12 ripetizioni",sets:3}

]

index=0
currentSet=0
show()

}

function startCore(){

exercises=[

{i:"🧠",n:"Dead Bug",d:"30 sec",sets:3},
{i:"🔥",n:"Mountain Climber",d:"30 sec",sets:3},
{i:"🧠",n:"Plank SX",d:"30 sec",sets:3},
{i:"🧠",n:"Plank DX",d:"30 sec",sets:3}

]

index=0
currentSet=0
show()

}

function show(){

let ex=exercises[index]

document.getElementById("icon").innerText=ex.i
document.getElementById("exercise").innerText=ex.n
document.getElementById("details").innerText=ex.d

document.getElementById("series").innerText="Serie: "+(currentSet+1)+" / "+ex.sets

}

function nextExercise(){

index++
currentSet=0

if(index>=exercises.length){
index=0
}

show()

}

function completeSet(){

let ex=exercises[index]

currentSet++

if(currentSet>=ex.sets){

startRecovery(90,true)

}else{

show()

startRecovery(60,false)

}

}

function startRecovery(seconds,changeExercise){

let screen=document.getElementById("recoveryScreen")

let timer=document.getElementById("recoveryTimer")

screen.style.display="flex"

timer.innerText=seconds

let interval=setInterval(function(){

seconds--

timer.innerText=seconds

if(seconds<=0){

clearInterval(interval)

screen.style.display="none"

let beep=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")

beep.play()

if(changeExercise){
nextExercise()
}

}

},1000)

}

</script>

</body>

</html>
