<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Scheda Allenamento</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
padding:10px;
margin:10px;
font-size:16px;
}

.timer{
font-size:28px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Scheda Allenamento</h1>

<h2 id="exercise"></h2>
<p id="details"></p>

<button onclick="nextExercise()">Prossimo esercizio</button>

<br>

<button onclick="startTimer(60)">Recupero 60s</button>
<button onclick="startTimer(90)">Recupero 90s</button>

<div class="timer" id="timer"></div>

</div>

<script>

const exercises = [

{ name:"Mobilità", details:"Gatto – Sfinge / Devoto / Rotazioni schiena" },

{ name:"Riscaldamento", details:"Tapis roulant 10 min" },

{ name:"Riscaldamento", details:"Skip basso 20 sec" },

{ name:"Riscaldamento", details:"Skip alto 20 sec" },

{ name:"Riscaldamento", details:"Calciata 20 sec" },

{ name:"Attivazione lombare", details:"Flessione lombare – 2 serie" },

{ name:"Squat", details:"4 x 10" },

{ name:"Sumo Squat", details:"4 x 10" },

{ name:"Leg Extension", details:"3 x 10-12" },

{ name:"Leg Curl", details:"3 x 10-12" },

{ name:"Affondi", details:"3 x 10 per gamba" },

{ name:"Stacco Rumeno", details:"3 x 10-12" },

{ name:"Dead Bug", details:"30 sec" },

{ name:"Mountain Climber", details:"30 sec" },

{ name:"Plank laterale SX", details:"30 sec" },

{ name:"Plank laterale DX", details:"30 sec" },

{ name:"Stretching", details:"Gambe / Schiena / Anche" }

]

let index=0

function showExercise(){

document.getElementById("exercise").innerText = exercises[index].name

document.getElementById("details").innerText = exercises[index].details

}

function nextExercise(){

index++

if(index >= exercises.length){
index = 0
}

showExercise()

}

let countdown

function startTimer(seconds){

clearInterval(countdown)

let time = seconds

document.getElementById("timer").innerText = time

countdown = setInterval(function(){

time--

document.getElementById("timer").innerText = time

if(time <= 0){

clearInterval(countdown)

document.getElementById("timer").innerText = "FINE"

}

},1000)

}

showExercise()

</script>

</body>

</html>
