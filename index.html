<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<title>Workout</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#0f172a;
margin:0;
color:white;
text-align:center;
}

.header{
padding:20px;
font-size:26px;
font-weight:bold;
}

.container{
padding:16px;
}

.card{
background:#1e293b;
border-radius:18px;
padding:20px;
margin-bottom:18px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
font-size:18px;
margin-top:10px;
background:#22c55e;
color:white;
}

.secondary{
background:#3b82f6;
}

.exercise{
font-size:26px;
margin-top:10px;
}

.series{
margin-top:10px;
font-size:18px;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
margin-top:10px;
font-size:18px;
text-align:center;
}

</style>

</head>

<body>

<div class="header">
🏋️ Workout
</div>

<div class="container">

<div class="card">

<button onclick="startWarmup()">Riscaldamento</button> <button onclick="startWorkoutA()">Gambe</button> <button onclick="startWorkoutB()">Parte alta</button> <button onclick="startCore()">Core</button>

</div>

<div class="card">

<div class="exercise" id="exercise">
Seleziona allenamento
</div>

<div class="series" id="series"></div>

<input id="weightInput" placeholder="Peso">

<button class="secondary" onclick="saveWeight()">Salva peso</button>

<button onclick="completeSet()">Serie completata</button>

</div>

</div>

<script>

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

let exercises=[]
let index=0
let currentSet=1

function startWarmup(){

exercises=[
{name:"Mobilità",sets:2},
{name:"Skip basso",sets:2},
{name:"Skip alto",sets:2},
{name:"Calciata",sets:2},
{name:"Flessione lombare",sets:2},
{name:"Tapis roulant",sets:1}
]

startWorkout()

}

function startWorkoutA(){

exercises=[
{name:"Squat",sets:4},
{name:"Sumo squat",sets:4},
{name:"Affondi",sets:3},
{name:"Stacco rumeno",sets:3}
]

startWorkout()

}

function startWorkoutB(){

exercises=[
{name:"Push up",sets:4},
{name:"Lat machine",sets:4},
{name:"Pull down",sets:4},
{name:"Shoulder press",sets:3},
{name:"Alzate laterali",sets:3},
{name:"Rematore",sets:3},
{name:"Leg extension",sets:3},
{name:"Leg curl",sets:3}
]

startWorkout()

}

function startCore(){

exercises=[
{name:"Dead bug",sets:3},
{name:"Mountain climber",sets:3},
{name:"Plank sx",sets:3},
{name:"Plank dx",sets:3}
]

startWorkout()

}

function startWorkout(){

index=0
currentSet=1
updateExercise()

}

function updateExercise(){

let ex=exercises[index]

document.getElementById("exercise").innerText=ex.name
document.getElementById("series").innerText="Serie "+currentSet+" / "+ex.sets

loadWeight()

}

function completeSet(){

let ex=exercises[index]

if(currentSet<ex.sets){

currentSet++

}else{

index++
currentSet=1

}

if(index>=exercises.length){

alert("Allenamento completato 💪")
return

}

updateExercise()

}

function saveWeight(){

let name=exercises[index].name
let weight=document.getElementById("weightInput").value

localStorage.setItem(name,weight)

}

function loadWeight(){

let name=exercises[index].name
let saved=localStorage.getItem(name)

document.getElementById("weightInput").value=saved?saved:""

}

</script>

</body>

</html>
