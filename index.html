<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Workout</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#0f172a;
margin:0;
color:white;
}

.header{
text-align:center;
padding:20px;
font-size:26px;
font-weight:bold;
}

.container{
padding:16px;
}

.card{
background:#1e293b;
border-radius:18px;
padding:20px;
margin-bottom:18px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
font-size:18px;
margin-top:10px;
background:#22c55e;
color:white;
}

.secondary{
background:#3b82f6;
}

.exerciseIcon{
font-size:48px;
text-align:center;
}

.exerciseName{
font-size:24px;
text-align:center;
margin-top:6px;
}

.exerciseDetails{
text-align:center;
opacity:0.8;
}

.series{
text-align:center;
margin-top:10px;
font-size:18px;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
margin-top:10px;
font-size:18px;
text-align:center;
}

#lastWeight{
text-align:center;
font-size:14px;
opacity:0.7;
margin-top:4px;
}

#progressBar{
height:10px;
background:#334155;
border-radius:10px;
margin-bottom:10px;
}

#progress{
height:10px;
background:#22c55e;
border-radius:10px;
width:0%;
}

#recoveryScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

#recoveryTimer{
font-size:120px;
font-weight:bold;
}

#finishScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

#finishTime{
font-size:50px;
margin-top:10px;
}

</style>

</head>

<body>

<div id="recoveryScreen">

<div style="font-size:28px;margin-bottom:20px">RECUPERO</div>
<div id="recoveryTimer">60</div>

</div>

<div id="finishScreen">

<h1>Allenamento completato 💪</h1>

<div>Durata allenamento</div>

<div id="finishTime"></div>

</div>

<div class="header">

🏋️ Workout

</div>

<div class="container">

<div class="card">

<button onclick="startGuided()">Allenamento di oggi</button>

<button onclick="startWarmup()">Riscaldamento</button>

<button onclick="startWorkoutA()">Gambe</button>

<button onclick="startWorkoutB()">Parte alta</button>

<button onclick="startCore()">Core</button>

</div>

<div class="card">

<div id="progressBar">
<div id="progress"></div>
</div>

<div class="exerciseIcon" id="icon"></div>

<div class="exerciseName" id="exercise"></div>

<div class="exerciseDetails" id="details"></div>

<div class="series" id="series"></div>

<div id="weightArea">

<input id="weightInput" placeholder="Peso">

<div id="lastWeight"></div>

<button class="secondary" onclick="saveWeight()">Salva peso</button>

</div>

<button onclick="completeSet()">Serie completata</button>

</div>

</div>

<script>

let exercises=[]
let index=0
let currentSet=0
let startTime=0
let workoutMode=false

function startTimerWorkout(){
startTime=Date.now()
}

function duration(){

let s=Math.floor((Date.now()-startTime)/1000)
let m=Math.floor(s/60)
let sec=s%60

if(sec<10)sec="0"+sec

return m+":"+sec

}

function updateProgress(){

let p=((index+1)/exercises.length)*100

document.getElementById("progress").style.width=p+"%"

}

function startGuided(){

let last=localStorage.getItem("lastWorkout")

if(last=="A"){

startWorkoutB()
localStorage.setItem("lastWorkout","B")

}else{

startWorkoutA()
localStorage.setItem("lastWorkout","A")

}

}

function startWarmup(){

workoutMode=false

document.getElementById("weightArea").style.display="none"

exercises=[

{i:"🧘",n:"Mobilità",d:"Gatto – Sfinge",sets:2},
{i:"⚡",n:"Skip basso",d:"20 sec",sets:2},
{i:"⚡",n:"Skip alto",d:"20 sec",sets:2},
{i:"⚡",n:"Calciata",d:"20 sec",sets:2},
{i:"🦴",n:"Flessione lombare",d:"10 rip",sets:2},
{i:"🏃",n:"Tapis roulant",d:"10 min",sets:1}

]

index=0
currentSet=0

show()

}

function startWorkoutA(){

workoutMode=true
startTimerWorkout()

document.getElementById("weightArea").style.display="block"

exercises=[

{i:"🏋️",n:"Squat",d:"10 rip",sets:4},
{i:"🏋️",n:"Sumo Squat",d:"10 rip",sets:4},
{i:"🚶",n:"Affondi",d:"10 rip",sets:3},
{i:"🏋️",n:"Stacco Rumeno",d:"10 rip",sets:3}

]

index=0
currentSet=0

show()

}

function startWorkoutB(){

workoutMode=true
startTimerWorkout()

document.getElementById("weightArea").style.display="block"

exercises=[

{i:"💪",n:"Push Up",d:"10 rip",sets:4},
{i:"💪",n:"Lat Machine",d:"10 rip",sets:4},
{i:"💪",n:"Pull Down",d:"10 rip",sets:4},
{i:"🏋️",n:"Shoulder Press",d:"12 rip",sets:3},
{i:"💪",n:"Alzate Laterali",d:"10 rip",sets:3},
{i:"💪",n:"Rematore",d:"10 rip",sets:3},
{i:"🦵",n:"Leg Extension",d:"12 rip",sets:3},
{i:"🦵",n:"Leg Curl",d:"12 rip",sets:3}

]

index=0
currentSet=0

show()

}

function startCore(){

workoutMode=false

document.getElementById("weightArea").style.display="none"

startTimerWorkout()

exercises=[

{i:"🧠",n:"Dead Bug",d:"30 sec",sets:3},
{i:"🔥",n:"Mountain Climber",d:"30 sec",sets:3},
{i:"🧠",n:"Plank SX",d:"30 sec",sets:3},
{i:"🧠",n:"Plank DX",d:"30 sec",sets:3}

]

index=0
currentSet=0

show()

}

function show(){

let ex=exercises[index]

document.getElementById("icon").innerText=ex.i
document.getElementById("exercise").innerText=ex.n
document.getElementById("details").innerText=ex.d
document.getElementById("series").innerText="Serie "+(currentSet+1)+" / "+ex.sets

updateProgress()

loadWeight()

}

function saveWeight(){

let name=exercises[index].n
let weight=document.getElementById("weightInput").value

localStorage.setItem(name,weight)

loadWeight()

}

function loadWeight(){

let name=exercises[index].n

let saved=localStorage.getItem(name)

if(saved){

document.getElementById("lastWeight").innerText="Ultimo peso: "+saved+" kg"

}else{

document.getElementById("lastWeight").innerText=""

}

document.getElementById("weightInput").value=""

}

function nextExercise(){

index++
currentSet=0

if(index>=exercises.length){

document.getElementById("finishScreen").style.display="flex"
document.getElementById("finishTime").innerText=duration()

return

}

show()

}

function completeSet(){

let ex=exercises[index]

currentSet++

if(currentSet>=ex.sets){

recovery(90,true)

}else{

show()
recovery(60,false)

}

}

function recovery(sec,next){

let screen=document.getElementById("recoveryScreen")
let timer=document.getElementById("recoveryTimer")

screen.style.display="flex"
timer.innerText=sec

let i=setInterval(function(){

sec--
timer.innerText=sec

if(sec<=0){

clearInterval(i)

screen.style.display="none"

let beep=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")
beep.play()

if(next)nextExercise()

}

},1000)

}

</script>

</body>

</html>
